<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Isaac Daga</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/Contacto.css">
</head>
<body>

<header>
    <h1>Contáctame</h1>
    <p>¿Tienes un proyecto en mente? Hablemos.</p>
</header>

<main>
    <section class="contacto">
        <div class="contenedor-contacto">
            <!-- FORMULARIO -->
            <form action="#" method="POST">
                <h2><i class="fas fa-paper-plane"></i> Envíame un mensaje</h2>
                
                <div class="input-group">
                    <label for="nombre">
                        <i class="fas fa-user"></i> Nombre completo
                    </label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                </div>

                <div class="input-group">
                    <label for="correo">
                        <i class="fas fa-envelope"></i> Correo electrónico
                    </label>
                    <input type="email" id="correo" name="correo" placeholder="Tu correo" required>
                </div>

                <div class="input-group">
                    <label for="mensaje">
                        <i class="fas fa-comment"></i> Mensaje
                    </label>
                    <textarea id="mensaje" name="mensaje" placeholder="Tu mensaje" required></textarea>
                </div>

                <button type="submit" class="btn-enviar">
                    <i class="fas fa-paper-plane"></i> Enviar mensaje
                </button>
            </form>

            <!-- INFO CONTACTO -->
            <div class="info-contacto">
                <div class="card-contacto">
                    <h2><i class="fas fa-address-card"></i> Contacto directo</h2>
                    
                    <div class="contacto-item">
                        <i class="fas fa-envelope-open-text"></i>
                        <p class="correo">
                            <a href="mailto:isaacdaga09@gmail.com">
                                isaacdaga09@gmail.com
                            </a>
                        </p>
                    </div>

                    <div class="divider"></div>

                    <div class="contacto-item">
                        <p class="whatsapp-texto">
                            <i class="fab fa-whatsapp"></i> Escríbeme por WhatsApp
                        </p>
                        <a href="https://wa.me/51930834729?text=Hola%20Isaac,%20me%20interesa%20contactarte" 
                           class="btn-whatsapp" target="_blank">
                            <i class="fab fa-whatsapp"></i> Chatear ahora
                        </a>
                    </div>

                    <div class="redes-sociales">
                        <a href="#" target="_blank" class="social-icon"><i class="fab fa-github"></i></a>
                        <a href="#" target="_blank" class="social-icon"><i class="fab fa-linkedin-in"></i></a>
                        <a href="#" target="_blank" class="social-icon"><i class="fab fa-x-twitter"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<footer>
    <p>© 2026 Anjelo Daga Dionisio | Todos los derechos reservados</p>
</footer>

</body>
</html>
